name: Build runtime

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    name: Validate pinned runtime source
    runs-on: macos-15-intel
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v17

      - name: Enable Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@v14

      - name: Show build host
        run: |
          sw_vers
          uname -a
          xcodebuild -version
          nix --version

      - name: Validate pinned source
        run: nix flake check -L --show-trace

  build-wine-runtime:
    name: Build Wine runtime artifact
    needs: validate
    runs-on: macos-15-intel
    timeout-minutes: 300
    outputs:
      runtime-release-tag: ${{ steps.release-version.outputs.runtime-release-tag }}
      runtime-release-title: ${{ steps.release-version.outputs.runtime-release-title }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v17

      - name: Enable Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@v14

      - name: Show build host
        run: |
          sw_vers
          uname -a
          xcodebuild -version
          nix --version

      - name: Build runtime
        run: nix build .#packages.x86_64-darwin.konyak-macos-wine-runtime -L --show-trace --out-link result-wine-runtime

      - name: Capture release version
        id: release-version
        run: |
          runtime_version="$(jq -r '.version' result-wine-runtime/build-info.json)"
          if [ -z "$runtime_version" ] || [ "$runtime_version" = "null" ]; then
            echo "Runtime build-info.json did not contain a release version." >&2
            exit 1
          fi
          echo "runtime-release-tag=$runtime_version" >> "$GITHUB_OUTPUT"
          echo "runtime-release-title=Konyak macOS runtime $runtime_version" >> "$GITHUB_OUTPUT"

      - name: Verify Wine32-on-64 runtime payload
        run: ./scripts/check-wine32on64-runtime.zsh result-wine-runtime

      - name: Package Wine runtime
        if: success()
        run: |
          mkdir -p dist
          nix shell nixpkgs#gnutar -c tar \
            --sort=name \
            --owner=0 \
            --group=0 \
            --numeric-owner \
            --mode='u+rwX,go+rX' \
            -C result-wine-runtime \
            -caf dist/konyak-macos-wine-runtime.tar.zst \
            .

      - name: Upload runtime artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: konyak-macos-wine-runtime
          path: dist/konyak-macos-wine-runtime.tar.zst
          if-no-files-found: error
          retention-days: 14

  build-dxmt-component:
    name: Build DXMT component artifact
    needs: build-wine-runtime
    runs-on: macos-15-intel
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v17

      - name: Enable Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@v14

      - name: Show build host
        run: |
          sw_vers
          uname -a
          xcodebuild -version
          nix --version

      - name: Download Wine runtime artifact
        uses: actions/download-artifact@v4
        with:
          name: konyak-macos-wine-runtime
          path: dist

      - name: Extract Wine runtime artifact
        run: |
          wine_runtime_root="$RUNNER_TEMP/konyak-dxmt-wine-runtime"
          rm -rf "$wine_runtime_root"
          mkdir -p "$wine_runtime_root"
          nix shell nixpkgs#gnutar -c tar \
            -xaf dist/konyak-macos-wine-runtime.tar.zst \
            -C "$wine_runtime_root"
          ./scripts/check-wine32on64-runtime.zsh "$wine_runtime_root"
          echo "KONYAK_WINE_RUNTIME_ROOT=$wine_runtime_root" >> "$GITHUB_ENV"

      - name: Install Metal toolchain
        run: |
          if ! /usr/bin/xcrun -sdk macosx -find metal >/dev/null 2>&1; then
            if xcodebuild -help 2>&1 | grep -q -- "-downloadComponent"; then
              xcodebuild -downloadComponent MetalToolchain
            fi
          fi

          metal_path="$(/usr/bin/xcrun -sdk macosx -find metal)"
          metallib_path="$(/usr/bin/xcrun -sdk macosx -find metallib)"
          echo "Metal: $metal_path"
          echo "Metallib: $metallib_path"
          echo "KONYAK_METAL_TOOLCHAIN_BIN=$(dirname "$metal_path")" >> "$GITHUB_ENV"

      - name: Build DXMT component
        run: |
          if [ -z "${KONYAK_WINE_RUNTIME_ROOT:-}" ] || [ ! -d "$KONYAK_WINE_RUNTIME_ROOT" ]; then
            echo "KONYAK_WINE_RUNTIME_ROOT must point at the extracted Wine runtime artifact." >&2
            exit 1
          fi
          nix build --impure .#packages.x86_64-darwin.konyak-macos-dxmt -L --show-trace --out-link result-dxmt

      - name: Verify DXMT component
        run: ./scripts/check-dxmt-component.zsh result-dxmt

      - name: Package DXMT component
        if: success()
        run: |
          mkdir -p dist
          mkdir -p dist/dxmt-component/lib/dxmt
          cp -R result-dxmt/. dist/dxmt-component/lib/dxmt/
          nix shell nixpkgs#gnutar -c tar \
            --sort=name \
            --owner=0 \
            --group=0 \
            --numeric-owner \
            --mode='u+rwX,go+rX' \
            -C dist/dxmt-component \
            -caf dist/konyak-macos-dxmt.tar.zst \
            .

      - name: Upload DXMT artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: konyak-macos-dxmt
          path: dist/konyak-macos-dxmt.tar.zst
          if-no-files-found: error
          retention-days: 14

  build-vkd3d-component:
    name: Build vkd3d component artifact
    needs: build-wine-runtime
    runs-on: macos-15-intel
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v17

      - name: Enable Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@v14

      - name: Show build host
        run: |
          sw_vers
          uname -a
          xcodebuild -version
          nix --version

      - name: Download Wine runtime artifact
        uses: actions/download-artifact@v4
        with:
          name: konyak-macos-wine-runtime
          path: dist

      - name: Extract Wine runtime artifact
        run: |
          wine_runtime_root="$RUNNER_TEMP/konyak-vkd3d-wine-runtime"
          rm -rf "$wine_runtime_root"
          mkdir -p "$wine_runtime_root"
          nix shell nixpkgs#gnutar -c tar \
            -xaf dist/konyak-macos-wine-runtime.tar.zst \
            -C "$wine_runtime_root"
          ./scripts/check-wine32on64-runtime.zsh "$wine_runtime_root"
          echo "KONYAK_WINE_RUNTIME_ROOT=$wine_runtime_root" >> "$GITHUB_ENV"

      - name: Build vkd3d component
        run: |
          if [ -z "${KONYAK_WINE_RUNTIME_ROOT:-}" ] || [ ! -d "$KONYAK_WINE_RUNTIME_ROOT" ]; then
            echo "KONYAK_WINE_RUNTIME_ROOT must point at the extracted Wine runtime artifact." >&2
            exit 1
          fi
          nix build --impure .#packages.x86_64-darwin.konyak-macos-vkd3d -L --show-trace --out-link result-vkd3d

      - name: Verify vkd3d component
        run: ./scripts/check-vkd3d-component.zsh result-vkd3d

      - name: Package vkd3d component
        if: success()
        run: |
          mkdir -p dist/vkd3d-component/lib/wine dist/vkd3d-component/Licenses
          cp -R result-vkd3d/x86_64-windows dist/vkd3d-component/lib/wine/
          cp -R result-vkd3d/i386-windows dist/vkd3d-component/lib/wine/
          cp -R result-vkd3d/Licenses/. dist/vkd3d-component/Licenses/
          nix shell nixpkgs#gnutar -c tar \
            --sort=name \
            --owner=0 \
            --group=0 \
            --numeric-owner \
            --mode='u+rwX,go+rX' \
            -C dist/vkd3d-component \
            -caf dist/konyak-macos-vkd3d.tar.zst \
            .

      - name: Upload vkd3d artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: konyak-macos-vkd3d
          path: dist/konyak-macos-vkd3d.tar.zst
          if-no-files-found: error
          retention-days: 14

  package-binary-components:
    name: Package binary runtime components
    needs: validate
    runs-on: macos-15-intel
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v17

      - name: Enable Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@v14

      - name: Verify Wine addon versions
        run: |
          nix shell nixpkgs#gnutar -c ./scripts/check-wine-addon-versions.zsh

      - name: Package binary runtime components
        run: |
          mkdir -p dist
          gstreamer_root="$(nix build --no-link --print-out-paths nixpkgs#legacyPackages.x86_64-darwin.gst_all_1.gstreamer.out)"
          gstreamer_plugins_base_root="$(nix build --no-link --print-out-paths nixpkgs#legacyPackages.x86_64-darwin.gst_all_1.gst-plugins-base.out)"
          gstreamer_plugins_good_root="$(nix build --no-link --print-out-paths nixpkgs#legacyPackages.x86_64-darwin.gst_all_1.gst-plugins-good.out)"
          gstreamer_plugins_bad_root="$(nix build --no-link --print-out-paths nixpkgs#legacyPackages.x86_64-darwin.gst_all_1.gst-plugins-bad.out)"
          freetype_root="$(nix build --no-link --print-out-paths nixpkgs#legacyPackages.x86_64-darwin.freetype.out)"
          nix shell nixpkgs#gnutar -c \
            ./scripts/package-binary-components.zsh \
              dist \
              "$gstreamer_root" \
              "$freetype_root" \
              "$gstreamer_root" \
              "$gstreamer_plugins_base_root" \
              "$gstreamer_plugins_good_root" \
              "$gstreamer_plugins_bad_root"

      - name: Verify DXVK component
        run: |
          dxvk_component_root="$RUNNER_TEMP/konyak-dxvk-component"
          rm -rf "$dxvk_component_root"
          mkdir -p "$dxvk_component_root"
          nix shell nixpkgs#gnutar -c tar \
            -xaf dist/konyak-macos-dxvk-macos.tar.zst \
            -C "$dxvk_component_root"
          ./scripts/check-dxvk-component.zsh "$dxvk_component_root"

      - name: Verify GStreamer component
        run: |
          gstreamer_component_root="$RUNNER_TEMP/konyak-gstreamer-component"
          rm -rf "$gstreamer_component_root"
          mkdir -p "$gstreamer_component_root"
          nix shell nixpkgs#gnutar -c tar \
            -xaf dist/konyak-macos-gstreamer.tar.zst \
            -C "$gstreamer_component_root"
          ./scripts/check-gstreamer-component.zsh "$gstreamer_component_root"

      - name: Verify Wine addon components
        run: |
          addon_component_root="$RUNNER_TEMP/konyak-wine-addons-component"
          rm -rf "$addon_component_root"
          mkdir -p "$addon_component_root"
          nix shell nixpkgs#gnutar -c tar \
            -xaf dist/konyak-macos-wine-mono.tar.zst \
            -C "$addon_component_root"
          nix shell nixpkgs#gnutar -c tar \
            -xaf dist/konyak-macos-wine-gecko.tar.zst \
            -C "$addon_component_root"
          ./scripts/check-wine-addons-component.zsh "$addon_component_root"

      - name: Upload binary component artifacts
        uses: actions/upload-artifact@v4
        with:
          name: konyak-macos-binary-components
          path: |
            dist/konyak-macos-dxvk-macos.tar.zst
            dist/konyak-macos-moltenvk.tar.zst
            dist/konyak-macos-gstreamer.tar.zst
            dist/konyak-macos-freetype.tar.zst
            dist/konyak-macos-wine-mono.tar.zst
            dist/konyak-macos-wine-gecko.tar.zst
            dist/konyak-macos-winetricks.tar.zst
          if-no-files-found: error
          retention-days: 14

  assemble-runtime-stack-artifact:
    name: Assemble runtime stack artifact
    needs:
      - build-wine-runtime
      - build-dxmt-component
      - build-vkd3d-component
      - package-binary-components
    runs-on: macos-15-intel
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v17

      - name: Enable Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@v14

      - name: Download Wine runtime artifact
        uses: actions/download-artifact@v4
        with:
          name: konyak-macos-wine-runtime
          path: dist

      - name: Download DXMT artifact
        uses: actions/download-artifact@v4
        with:
          name: konyak-macos-dxmt
          path: dist

      - name: Download vkd3d artifact
        uses: actions/download-artifact@v4
        with:
          name: konyak-macos-vkd3d
          path: dist

      - name: Download binary component artifacts
        uses: actions/download-artifact@v4
        with:
          name: konyak-macos-binary-components
          path: dist

      - name: Assemble and verify runtime stack
        run: |
          runtime_stack_root="$RUNNER_TEMP/konyak-runtime-stack"
          ./scripts/assemble-runtime-stack.zsh \
            dist \
            "$runtime_stack_root" \
            dist/konyak-macos-wine-runtime-stack.tar.zst
          ./scripts/check-wine32on64-runtime.zsh "$runtime_stack_root"
          ./scripts/check-dxmt-component.zsh "$runtime_stack_root"
          ./scripts/check-vkd3d-component.zsh "$runtime_stack_root"
          ./scripts/check-dxvk-component.zsh "$runtime_stack_root"
          ./scripts/check-gstreamer-component.zsh "$runtime_stack_root"
          ./scripts/check-wine-addons-component.zsh "$runtime_stack_root"

      - name: Upload runtime stack artifact
        uses: actions/upload-artifact@v4
        with:
          name: konyak-macos-wine-runtime-stack
          path: dist/konyak-macos-wine-runtime-stack.tar.zst
          if-no-files-found: error
          retention-days: 14

  generate-release-metadata:
    name: Generate release metadata
    needs:
      - build-wine-runtime
      - build-dxmt-component
      - build-vkd3d-component
      - package-binary-components
      - assemble-runtime-stack-artifact
    runs-on: macos-15-intel
    timeout-minutes: 30
    env:
      KONYAK_RUNTIME_RELEASE_TAG: ${{ needs.build-wine-runtime.outputs.runtime-release-tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v17

      - name: Download Wine runtime artifact
        uses: actions/download-artifact@v4
        with:
          name: konyak-macos-wine-runtime
          path: dist

      - name: Download DXMT artifact
        uses: actions/download-artifact@v4
        with:
          name: konyak-macos-dxmt
          path: dist

      - name: Download vkd3d artifact
        uses: actions/download-artifact@v4
        with:
          name: konyak-macos-vkd3d
          path: dist

      - name: Download binary component artifacts
        uses: actions/download-artifact@v4
        with:
          name: konyak-macos-binary-components
          path: dist

      - name: Download runtime stack artifact
        uses: actions/download-artifact@v4
        with:
          name: konyak-macos-wine-runtime-stack
          path: dist

      - name: Generate release metadata
        run: |
          KONYAK_SINGLE_STACK_ARCHIVE=1 \
          KONYAK_RELEASE_ASSET_BASE_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${KONYAK_RUNTIME_RELEASE_TAG}" \
            nix shell nixpkgs#jq -c \
            ./scripts/make-source-manifest.zsh \
              dist \
              dist/konyak-macos-wine-runtime-stack.tar.zst \
              dxmt=dist/konyak-macos-dxmt.tar.zst \
              vkd3d=dist/konyak-macos-vkd3d.tar.zst \
              dxvk-macos=dist/konyak-macos-dxvk-macos.tar.zst \
              moltenvk=dist/konyak-macos-moltenvk.tar.zst \
              gstreamer=dist/konyak-macos-gstreamer.tar.zst \
              freetype=dist/konyak-macos-freetype.tar.zst \
              wine-mono=dist/konyak-macos-wine-mono.tar.zst \
              wine-gecko=dist/konyak-macos-wine-gecko.tar.zst \
              winetricks=dist/konyak-macos-winetricks.tar.zst

      - name: Upload release metadata
        uses: actions/upload-artifact@v4
        with:
          name: konyak-macos-release-metadata
          path: |
            dist/konyak-macos-wine-runtime-stack-source.json
            dist/konyak-macos-runtime.release.json
          if-no-files-found: error
          retention-days: 14

  smoke-wine32on64:
    name: Verify Wine32-on-64 launch smoke
    needs: assemble-runtime-stack-artifact
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v17

      - name: Enable Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@v14

      - name: Install Rosetta
        run: |
          if [ "$(uname -m)" = "arm64" ]; then
            sudo softwareupdate --install-rosetta --agree-to-license || true
          fi

      - name: Download runtime stack artifact
        uses: actions/download-artifact@v4
        with:
          name: konyak-macos-wine-runtime-stack
          path: dist

      - name: Verify Wine32-on-64 launch smoke
        run: |
          smoke_runtime_root="/tmp/konyak-wine32on64-smoke-runtime"
          rm -rf "$smoke_runtime_root"
          mkdir -p "$smoke_runtime_root"
          nix shell nixpkgs#gnutar -c tar \
            -xaf dist/konyak-macos-wine-runtime-stack.tar.zst \
            -C "$smoke_runtime_root"
          ./scripts/check-wine32on64-runtime.zsh "$smoke_runtime_root"
          ./scripts/check-dxmt-component.zsh "$smoke_runtime_root"
          ./scripts/check-vkd3d-component.zsh "$smoke_runtime_root"
          ./scripts/check-dxvk-component.zsh "$smoke_runtime_root"
          ./scripts/check-gstreamer-component.zsh "$smoke_runtime_root"
          ./scripts/smoke-wine32on64-launch.zsh "$smoke_runtime_root"

  smoke-dxvk-d3d11:
    name: Verify DXVK D3D11 backend smoke
    needs: assemble-runtime-stack-artifact
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v17

      - name: Enable Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@v14

      - name: Install Rosetta
        run: |
          if [ "$(uname -m)" = "arm64" ]; then
            sudo softwareupdate --install-rosetta --agree-to-license || true
          fi

      - name: Download runtime stack artifact
        uses: actions/download-artifact@v4
        with:
          name: konyak-macos-wine-runtime-stack
          path: dist

      - name: Verify DXVK D3D11 backend smoke
        run: |
          smoke_runtime_root="/tmp/konyak-dxvk-d3d11-smoke-runtime"
          rm -rf "$smoke_runtime_root"
          mkdir -p "$smoke_runtime_root"
          nix shell nixpkgs#gnutar -c tar \
            -xaf dist/konyak-macos-wine-runtime-stack.tar.zst \
            -C "$smoke_runtime_root"
          ./scripts/check-dxvk-component.zsh "$smoke_runtime_root"
          nix develop -c zsh -lc "./scripts/smoke-backend-device.zsh $smoke_runtime_root dxvk-d3d11"

  smoke-gui-launch:
    name: Verify GUI start /unix smoke
    needs: assemble-runtime-stack-artifact
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v17

      - name: Enable Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@v14

      - name: Install Rosetta
        run: |
          if [ "$(uname -m)" = "arm64" ]; then
            sudo softwareupdate --install-rosetta --agree-to-license || true
          fi

      - name: Download runtime stack artifact
        uses: actions/download-artifact@v4
        with:
          name: konyak-macos-wine-runtime-stack
          path: dist

      - name: Verify GUI start /unix smoke
        run: |
          smoke_runtime_root="/tmp/konyak-gui-launch-smoke-runtime"
          rm -rf "$smoke_runtime_root"
          mkdir -p "$smoke_runtime_root"
          nix shell nixpkgs#gnutar -c tar \
            -xaf dist/konyak-macos-wine-runtime-stack.tar.zst \
            -C "$smoke_runtime_root"
          ./scripts/check-wine32on64-runtime.zsh "$smoke_runtime_root"
          ./scripts/check-gstreamer-component.zsh "$smoke_runtime_root"
          nix develop -c zsh -lc "./scripts/smoke-gui-launch.zsh $smoke_runtime_root"

  smoke-dxmt-d3d11:
    name: Verify DXMT D3D11 backend smoke
    needs: assemble-runtime-stack-artifact
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v17

      - name: Enable Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@v14

      - name: Install Rosetta
        run: |
          if [ "$(uname -m)" = "arm64" ]; then
            sudo softwareupdate --install-rosetta --agree-to-license || true
          fi

      - name: Download runtime stack artifact
        uses: actions/download-artifact@v4
        with:
          name: konyak-macos-wine-runtime-stack
          path: dist

      - name: Verify DXMT D3D11 backend smoke
        run: |
          smoke_runtime_root="/tmp/konyak-dxmt-d3d11-smoke-runtime"
          rm -rf "$smoke_runtime_root"
          mkdir -p "$smoke_runtime_root"
          nix shell nixpkgs#gnutar -c tar \
            -xaf dist/konyak-macos-wine-runtime-stack.tar.zst \
            -C "$smoke_runtime_root"
          ./scripts/check-dxmt-component.zsh "$smoke_runtime_root"
          nix develop -c zsh -lc "./scripts/smoke-backend-device.zsh $smoke_runtime_root dxmt-d3d11"

  smoke-vkd3d-d3d12:
    name: Verify vkd3d D3D12 backend smoke
    needs: assemble-runtime-stack-artifact
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v17

      - name: Enable Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@v14

      - name: Install Rosetta
        run: |
          if [ "$(uname -m)" = "arm64" ]; then
            sudo softwareupdate --install-rosetta --agree-to-license || true
          fi

      - name: Download runtime stack artifact
        uses: actions/download-artifact@v4
        with:
          name: konyak-macos-wine-runtime-stack
          path: dist

      - name: Verify vkd3d D3D12 backend smoke
        run: |
          smoke_runtime_root="/tmp/konyak-vkd3d-d3d12-smoke-runtime"
          rm -rf "$smoke_runtime_root"
          mkdir -p "$smoke_runtime_root"
          nix shell nixpkgs#gnutar -c tar \
            -xaf dist/konyak-macos-wine-runtime-stack.tar.zst \
            -C "$smoke_runtime_root"
          ./scripts/check-vkd3d-component.zsh "$smoke_runtime_root"
          nix develop -c zsh -lc "./scripts/smoke-backend-device.zsh $smoke_runtime_root vkd3d-d3d12"

  publish-release:
    name: Publish runtime release
    needs:
      - build-wine-runtime
      - assemble-runtime-stack-artifact
      - generate-release-metadata
      - smoke-wine32on64
      - smoke-gui-launch
      - smoke-dxvk-d3d11
      - smoke-dxmt-d3d11
      - smoke-vkd3d-d3d12
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      KONYAK_RUNTIME_RELEASE_TAG: ${{ needs.build-wine-runtime.outputs.runtime-release-tag }}
      KONYAK_RUNTIME_RELEASE_TITLE: ${{ needs.build-wine-runtime.outputs.runtime-release-title }}
    steps:
      - name: Download runtime stack artifact
        uses: actions/download-artifact@v4
        with:
          name: konyak-macos-wine-runtime-stack
          path: dist

      - name: Download release metadata
        uses: actions/download-artifact@v4
        with:
          name: konyak-macos-release-metadata
          path: dist

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cat > dist/release-notes.md <<EOF
          Konyak macOS runtime ${KONYAK_RUNTIME_RELEASE_TAG}.

          This release was generated by GitHub Actions from commit ${GITHUB_SHA}.
          EOF

          release_assets=(
            dist/konyak-macos-wine-runtime-stack.tar.zst
            dist/konyak-macos-wine-runtime-stack-source.json
            dist/konyak-macos-runtime.release.json
          )

          if gh release view "$KONYAK_RUNTIME_RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$KONYAK_RUNTIME_RELEASE_TAG" "${release_assets[@]}" \
              --clobber \
              --repo "$GITHUB_REPOSITORY"
            gh release edit "$KONYAK_RUNTIME_RELEASE_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$KONYAK_RUNTIME_RELEASE_TITLE" \
              --notes-file dist/release-notes.md \
              --latest
          else
            gh release create "$KONYAK_RUNTIME_RELEASE_TAG" "${release_assets[@]}" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$KONYAK_RUNTIME_RELEASE_TITLE" \
              --notes-file dist/release-notes.md \
              --latest
          fi
