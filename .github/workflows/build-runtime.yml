name: Build runtime

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build CrossOver-derived Wine runtime
    runs-on: macos-15-intel
    timeout-minutes: 360
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v17

      - name: Show build host
        run: |
          sw_vers
          uname -a
          xcodebuild -version
          nix --version

      - name: Validate pinned source
        run: nix flake check -L --show-trace

      - name: Build runtime
        run: nix build .#packages.x86_64-darwin.konyak-macos-wine-runtime -L --show-trace

      - name: Package Wine runtime
        if: success()
        run: |
          mkdir -p dist
          nix shell nixpkgs#gnutar -c tar \
            --sort=name \
            --owner=0 \
            --group=0 \
            --numeric-owner \
            --mode='u+rwX,go+rX' \
            -C result \
            -caf dist/konyak-macos-wine-runtime.tar.zst \
            .

      - name: Install Metal toolchain
        run: |
          if ! /usr/bin/xcrun -sdk macosx -find metal >/dev/null 2>&1; then
            if xcodebuild -help 2>&1 | grep -q -- "-downloadComponent"; then
              xcodebuild -downloadComponent MetalToolchain
            fi
          fi

          metal_path="$(/usr/bin/xcrun -sdk macosx -find metal)"
          metallib_path="$(/usr/bin/xcrun -sdk macosx -find metallib)"
          echo "Metal: $metal_path"
          echo "Metallib: $metallib_path"
          echo "KONYAK_METAL_TOOLCHAIN_BIN=$(dirname "$metal_path")" >> "$GITHUB_ENV"

      - name: Build DXMT component
        run: nix build --impure .#packages.x86_64-darwin.konyak-macos-dxmt -L --show-trace

      - name: Package DXMT component
        if: success()
        run: |
          mkdir -p dist
          mkdir -p dist/dxmt-component/components/dxmt
          cp -R result/. dist/dxmt-component/components/dxmt/
          nix shell nixpkgs#gnutar -c tar \
            --sort=name \
            --owner=0 \
            --group=0 \
            --numeric-owner \
            --mode='u+rwX,go+rX' \
            -C dist/dxmt-component \
            -caf dist/konyak-macos-dxmt.tar.zst \
            .

      - name: Package binary runtime components
        if: success()
        run: |
          gstreamer_root="$(nix build --no-link --print-out-paths nixpkgs#gst_all_1.gstreamer.out)"
          nix shell nixpkgs#gnutar -c \
            ./scripts/package-binary-components.zsh \
              dist \
              "$gstreamer_root"

      - name: Generate release metadata
        if: success()
        run: |
          KONYAK_RELEASE_ASSET_BASE_URL="https://github.com/${GITHUB_REPOSITORY}/releases/latest/download" \
            ./scripts/make-source-manifest.zsh \
              dist \
              dist/konyak-macos-wine-runtime.tar.zst \
              dxmt=dist/konyak-macos-dxmt.tar.zst \
              dxvk-macos=dist/konyak-macos-dxvk-macos.tar.zst \
              moltenvk=dist/konyak-macos-moltenvk.tar.zst \
              gstreamer=dist/konyak-macos-gstreamer.tar.zst \
              wine-mono=dist/konyak-macos-wine-mono.tar.zst \
              winetricks=dist/konyak-macos-winetricks.tar.zst

      - name: Upload runtime artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: konyak-macos-wine-runtime
          path: |
            dist/konyak-macos-wine-runtime.tar.zst
            dist/konyak-macos-dxmt.tar.zst
            dist/konyak-macos-dxvk-macos.tar.zst
            dist/konyak-macos-moltenvk.tar.zst
            dist/konyak-macos-gstreamer.tar.zst
            dist/konyak-macos-wine-mono.tar.zst
            dist/konyak-macos-winetricks.tar.zst
            dist/konyak-macos-wine-runtime-stack-source.json
            dist/konyak-macos-runtime.release.json

      - name: Upload DXMT artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: konyak-macos-dxmt
          path: dist/konyak-macos-dxmt.tar.zst
