name: Build runtime

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build CrossOver-derived Wine runtime
    runs-on: macos-13
    timeout-minutes: 360
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v17

      - name: Show build host
        run: |
          sw_vers
          uname -a
          xcodebuild -version
          nix --version

      - name: Validate pinned source
        run: nix flake check -L --show-trace

      - name: Build runtime
        run: nix build .#konyak-macos-wine-runtime -L --show-trace

      - name: Package result
        if: success()
        run: |
          mkdir -p dist
          tar -C result -caf dist/konyak-macos-wine-runtime.tar.zst .
          ./scripts/make-source-manifest.zsh dist dist/konyak-macos-wine-runtime.tar.zst

      - name: Upload runtime artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: konyak-macos-wine-runtime
          path: dist/*
