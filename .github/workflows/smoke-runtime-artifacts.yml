name: Smoke runtime artifacts

on:
  workflow_dispatch:
    inputs:
      artifact_run_id:
        description: GitHub Actions run id containing uploaded runtime artifacts
        required: true
        type: string

permissions:
  actions: read
  contents: read

jobs:
  smoke-wine32on64:
    name: Verify runtime smoke from artifacts
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v17

      - name: Enable Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@v14

      - name: Install Rosetta
        run: |
          if [ "$(uname -m)" = "arm64" ]; then
            sudo softwareupdate --install-rosetta --agree-to-license || true
          fi

      - name: Download runtime stack artifact
        uses: actions/download-artifact@v4
        with:
          name: konyak-macos-wine-runtime-stack
          path: dist
          run-id: ${{ inputs.artifact_run_id }}
          github-token: ${{ github.token }}

      - name: Verify Wine32-on-64 launch smoke
        run: |
          smoke_runtime_root="/tmp/konyak-wine32on64-smoke-runtime"
          rm -rf "$smoke_runtime_root"
          mkdir -p "$smoke_runtime_root"
          nix shell nixpkgs#gnutar -c tar \
            -xaf dist/konyak-macos-wine-runtime-stack.tar.zst \
            -C "$smoke_runtime_root"
          nix shell nixpkgs#gnutar -c ./scripts/check-runtime-archive-excludes-gptk.zsh dist/konyak-macos-wine-runtime-stack.tar.zst
          ./scripts/check-wine32on64-runtime.zsh "$smoke_runtime_root"
          ./scripts/check-dxmt-component.zsh "$smoke_runtime_root"
          ./scripts/check-vkd3d-component.zsh "$smoke_runtime_root"
          ./scripts/check-dxvk-component.zsh "$smoke_runtime_root"
          ./scripts/check-gstreamer-component.zsh "$smoke_runtime_root"
          ./scripts/check-wine-addons-component.zsh "$smoke_runtime_root"
          ./scripts/smoke-wine32on64-launch.zsh "$smoke_runtime_root"
          nix develop -c zsh -lc "./scripts/smoke-gui-launch.zsh $smoke_runtime_root"
          nix develop -c zsh -lc "./scripts/smoke-backend-device.zsh $smoke_runtime_root dxvk-d3d11"
          nix develop -c zsh -lc "./scripts/smoke-backend-device.zsh $smoke_runtime_root dxmt-d3d11"
          nix develop -c zsh -lc "./scripts/smoke-backend-device.zsh $smoke_runtime_root vkd3d-d3d12"

  smoke-gptk-d3dmetal:
    name: Verify GPTK/D3DMetal smoke from artifacts
    runs-on: macos-15
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v17

      - name: Enable Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@v14

      - name: Install Rosetta
        run: |
          if [ "$(uname -m)" = "arm64" ]; then
            sudo softwareupdate --install-rosetta --agree-to-license || true
          fi

      - name: Download runtime stack artifact
        uses: actions/download-artifact@v4
        with:
          name: konyak-macos-wine-runtime-stack
          path: dist
          run-id: ${{ inputs.artifact_run_id }}
          github-token: ${{ github.token }}

      - name: Verify GPTK/D3DMetal backend smoke
        run: |
          smoke_runtime_root="/tmp/konyak-gptk-artifact-smoke-runtime"
          gptk_work_root="$RUNNER_TEMP/konyak-gptk-artifact-smoke-payload"
          probe_root="$RUNNER_TEMP/konyak-gptk-artifact-backend-probes"
          rm -rf "$smoke_runtime_root" "$gptk_work_root" "$probe_root"
          mkdir -p "$smoke_runtime_root"
          nix shell nixpkgs#gnutar -c tar \
            -xaf dist/konyak-macos-wine-runtime-stack.tar.zst \
            -C "$smoke_runtime_root"
          nix shell nixpkgs#gnutar -c ./scripts/check-runtime-archive-excludes-gptk.zsh dist/konyak-macos-wine-runtime-stack.tar.zst
          ./scripts/check-wine32on64-runtime.zsh "$smoke_runtime_root"
          nix develop -c zsh -lc "nix shell nixpkgs#gnutar -c ./scripts/prepare-gptk-d3dmetal-ci-smoke.zsh $smoke_runtime_root $gptk_work_root"
          nix develop -c zsh -lc "./scripts/smoke-backend-device.zsh $smoke_runtime_root gptk-d3d11-device $probe_root"
          nix develop -c zsh -lc "./scripts/smoke-backend-device.zsh $smoke_runtime_root gptk-d3d12-device $probe_root"
